<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMC Chat Widget — Dev</title>
  <script type="module" src="/build/smc-chat-widget.esm.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .dev-panel {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #8b8fa3;
      margin-bottom: 1.5rem;
    }
    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #2d2d44;
    }
    .mode-btn {
      flex: 1;
      padding: 0.625rem 1rem;
      border: none;
      background: #2d2d44;
      color: #8b8fa3;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active {
      background: #6366f1;
      color: #fff;
    }
    .mode-btn:hover:not(.active) {
      background: #3d3d5c;
    }
    .panel-section {
      margin-bottom: 1.5rem;
    }
    .scenario-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .scenario-btn {
      padding: 0.5rem 0.875rem;
      border: 1px solid #2d2d44;
      background: #2d2d44;
      color: #c7c9d9;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .scenario-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }
    .scenario-btn:hover:not(.active) {
      background: #3d3d5c;
    }
    .hint {
      font-size: 0.75rem;
      color: #8b8fa3;
      margin-top: 0.5rem;
    }
    .panel-section label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b8fa3;
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%;
      min-height: 360px;
      padding: 1rem;
      background: #16162a;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus {
      border-color: #6366f1;
    }
    textarea.error {
      border-color: #ef4444;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.75rem;
      margin-top: 0.375rem;
      display: none;
    }
    .error-msg.visible {
      display: block;
    }
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #6366f1;
      color: #fff;
    }
    .btn-primary:hover { background: #5558e6; }
    .btn-secondary {
      background: #2d2d44;
      color: #e0e0e0;
    }
    .btn-secondary:hover { background: #3d3d5c; }
    .live-inputs {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .live-inputs .field {
      flex: 1;
      min-width: 200px;
    }
    .live-inputs input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #16162a;
      border: 1px solid #2d2d44;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .live-inputs input:focus {
      border-color: #6366f1;
    }
    .live-inputs input::placeholder {
      color: #555;
    }
    #widget-container {
      margin-top: 2rem;
      border: 1px dashed #2d2d44;
      border-radius: 8px;
      min-height: 500px;
      position: relative;
    }
    #widget-container iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 8px;
    }
    .container-label {
      position: absolute;
      top: -0.6rem;
      left: 1rem;
      background: #1a1a2e;
      padding: 0 0.5rem;
      font-size: 0.6875rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="dev-panel">
    <h1>SDK Dev Server</h1>
    <p class="subtitle">Configure and preview the chat widget locally.</p>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-mock" onclick="switchMode('mock')" aria-pressed="true">Mock Config</button>
      <button class="mode-btn" id="btn-live" onclick="switchMode('live')" aria-pressed="false">Live API</button>
    </div>

    <!-- Mock Mode -->
    <div id="mock-panel">
      <div class="panel-section">
        <label>Mock Scenario</label>
        <div class="scenario-row">
          <button class="scenario-btn active" data-scenario="thinking" onclick="setScenario('thinking')">🧠 Thinking</button>
          <button class="scenario-btn" data-scenario="menu" onclick="setScenario('menu')">📋 Menu</button>
          <button class="scenario-btn" data-scenario="files" onclick="setScenario('files')">📎 Files</button>
          <button class="scenario-btn" data-scenario="image" onclick="setScenario('image')">🖼️ Image</button>
          <button class="scenario-btn" data-scenario="error" onclick="setScenario('error')">⚠️ Error</button>
        </div>
        <p class="hint">Open the widget (launcher, bottom-right) and send any message to play the selected scenario.</p>
      </div>
      <div class="panel-section">
        <label for="config-json">Bootstrap Config JSON</label>
        <textarea id="config-json"></textarea>
        <p class="error-msg" id="json-error" aria-live="polite">Invalid JSON — fix syntax errors before applying.</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="applyMockConfig()">Apply Config</button>
        <button class="btn btn-secondary" onclick="resetDefaults()">Reset to Defaults</button>
      </div>
    </div>

    <!-- Live Mode -->
    <div id="live-panel" style="display:none;">
      <div class="panel-section">
        <div class="live-inputs">
          <div class="field">
            <label for="sdk-id-input">SDK ID</label>
            <input type="text" id="sdk-id-input" placeholder="sdk_678c172fc868" />
          </div>
          <div class="field">
            <label for="api-url-input">API URL</label>
            <input type="text" id="api-url-input" placeholder="http://localhost:3005" />
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="connectLive()">Connect</button>
      </div>
    </div>

    <div id="widget-container">
      <span class="container-label">Widget Preview</span>
    </div>
  </div>

  <script>
    const DEFAULT_CONFIG = {
      agentId: 'agent_demo_001',
      apiKeyPrefix: 'sk_demo',
      theme: 'light',
      primaryColor: '#6366f1',
      secondaryColor: '#e0e7ff',
      position: 'right',
      headerText: 'Chat with us',
      headerIcon: null,
      botName: 'Assistant',
      botAvatar: null,
      welcomeMessage: 'Hello! How can I help you today?',
      inputPlaceholder: 'Type your message...',
      preChatForm: null,
      quickReplies: ['What can you do?', 'Help me get started'],
      proactiveRules: null,
      kbEnabled: false,
      fileUpload: false,
      csatEnabled: false,
      csatType: 'thumbs',
    };

    const textarea = document.getElementById('config-json');
    const errorMsg = document.getElementById('json-error');
    const container = document.getElementById('widget-container');

    let selectedScenario = 'thinking';

    textarea.value = JSON.stringify(DEFAULT_CONFIG, null, 2);

    function setScenario(key) {
      selectedScenario = key;
      document.querySelectorAll('.scenario-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.scenario === key);
      });
      // Re-mount so the new scenario takes effect on the next send.
      applyMockConfig();
    }

    function switchMode(mode) {
      document.getElementById('btn-mock').classList.toggle('active', mode === 'mock');
      document.getElementById('btn-live').classList.toggle('active', mode === 'live');
      document.getElementById('btn-mock').setAttribute('aria-pressed', mode === 'mock');
      document.getElementById('btn-live').setAttribute('aria-pressed', mode === 'live');
      document.getElementById('mock-panel').style.display = mode === 'mock' ? 'block' : 'none';
      document.getElementById('live-panel').style.display = mode === 'live' ? 'block' : 'none';
      clearWidget();
    }

    function clearWidget() {
      const existing = container.querySelector('iframe');
      if (existing) existing.remove();
    }

    function createWidgetIframe(attrs) {
      clearWidget();
      const iframe = document.createElement('iframe');
      container.appendChild(iframe);
      const doc = iframe.contentDocument;
      const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v.replace(/"/g, '&quot;')}"`)
        .join(' ');
      doc.open();
      doc.write(`<!DOCTYPE html>
<html><head>
<script type="module" src="/build/smc-chat-widget.esm.js"><\/script>
<style>body { margin: 0; background: #f9fafb; }</style>
</head><body>
<smc-chat-widget ${attrStr}></smc-chat-widget>
</body></html>`);
      doc.close();
    }

    function applyMockConfig() {
      const raw = textarea.value.trim();
      try {
        JSON.parse(raw);
        textarea.classList.remove('error');
        errorMsg.classList.remove('visible');
      } catch (e) {
        textarea.classList.add('error');
        errorMsg.classList.add('visible');
        return;
      }
      createWidgetIframe({ 'sdk-id': 'dev_mock', 'mock-config': raw, 'mock-scenario': selectedScenario });
    }

    function connectLive() {
      const sdkId = document.getElementById('sdk-id-input').value.trim();
      const apiUrl = document.getElementById('api-url-input').value.trim() || 'http://localhost:3005';
      if (!sdkId) {
        document.getElementById('sdk-id-input').style.borderColor = '#ef4444';
        return;
      }
      document.getElementById('sdk-id-input').style.borderColor = '';
      createWidgetIframe({ 'sdk-id': sdkId, 'api-url': apiUrl });
    }

    function resetDefaults() {
      textarea.value = JSON.stringify(DEFAULT_CONFIG, null, 2);
      textarea.classList.remove('error');
      errorMsg.classList.remove('visible');
      applyMockConfig();
    }

    // Boot with mock config on page load
    applyMockConfig();
  </script>
</body>
</html>
